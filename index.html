<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha EGITO_NCRP</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #f39c12;
            --danger: #c0392b;
            --success: #27ae60;
            --info: #2980b9;
            --dark: #121212;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://cdn.discordapp.com/attachments/1438240224823083081/1477755667837223117/PLANILHA.png?ex=69a5eab6&is=69a49936&hm=3ca8b91d69276f69f190cc97a5134cebe489343a8d2af536a1306ec95b201443&');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; 
            color: white; 
            overflow-x: hidden; 
        }
        
        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2b2b2b; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .role-option { background: #333; padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; transition: 0.3s; }
        .role-option.active { border-color: var(--accent); background: #3d2e10; color: var(--accent); font-weight: bold; }

        #dashboard, #history-page { display: none; padding: 20px; animation: fadeIn 0.5s; }
        header { display: flex; justify-content: space-between; align-items: center; background: rgba(30, 30, 30, 0.9); padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--accent); backdrop-filter: blur(5px); }
        
        .table-container { background: rgba(30, 30, 30, 0.85); padding: 20px; border-radius: 10px; overflow-x: auto; position: relative; backdrop-filter: blur(5px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 12px; text-align: center; font-size: 13px; font-weight: bold; color: white; }
        th { background: rgba(37, 37, 37, 0.9); color: var(--accent); text-transform: uppercase; }

        .select-cargo { background: #2b2b2b; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }

        .btn-action { color: white; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; margin-bottom: 5px; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn-green { background: var(--success); }
        .btn-blue { background: var(--info); }
        .btn-yellow { background: var(--accent); color: #000; }
        .btn-red { background: var(--danger); }
        .btn-refresh { background: #34495e; }

        .color-picker { position: absolute; display: none; background: #333; padding: 8px; border-radius: 8px; grid-template-columns: repeat(4, 1fr); gap: 5px; z-index: 100; border: 1px solid #555; }
        .color-dot { width: 25px; height: 25px; border-radius: 4px; cursor: pointer; border: 1px solid #fff; }

        #view-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; padding:40px; box-sizing:border-box; overflow-y:auto; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><span id="loader-text">Processando...</span></div>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent); margin-top: 0;">FAMÍLIA GESTÃO</h2>
            <input type="text" id="user-nick" placeholder="Seu Nick">
            <input type="number" id="user-city-id" placeholder="ID da Cidade">
            <div id="role-selector" style="margin: 15px 0;">
                <div class="role-option" onclick="selectRole(this, 'Responsável')">Responsável</div>
                <div class="role-option" onclick="selectRole(this, 'Auxiliar')">Auxiliar</div>
            </div>
            <label style="color:#888; font-size: 13px; cursor: pointer; display: block; margin-bottom: 15px;">
                <input type="checkbox" id="remember-box"> Lembrar minha conta
            </label>
            <button class="btn-action btn-yellow" style="width:100%; justify-content: center; padding: 15px;" onclick="actionWithLoading(login, 'Acessando...')">Entrar no Sistema</button>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div id="welcome-msg" style="font-size: 18px;">Painel</div>
            <div style="display: flex; gap: 5px;">
                <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="importCSV(this)">
                <input type="file" id="xlsx-file" accept=".xlsx, .xls" style="display:none" onchange="importXLSX(this)">
                
                <button class="btn-action btn-blue" onclick="document.getElementById('csv-file').click()">📤 .CSV</button>
                <button class="btn-action btn-green" style="background:#1d6f42" onclick="document.getElementById('xlsx-file').click()">📤 .XLSX</button>
                <button class="btn-action btn-red" onclick="actionWithLoading(() => location.reload(), 'Saindo...')">Sair</button>
            </div>
        </header>

        <div class="table-container">
            <div style="margin-bottom:20px;">
                <button class="btn-action btn-green" onclick="addRow()">➕ Novo Membro</button>
                <button class="btn-action btn-refresh" onclick="actionWithLoading(renderTable, 'Atualizando...', 'refresh')">🔄 Atualizar</button>
                <button class="btn-action btn-yellow" onclick="actionWithLoading(organizeTable, 'Organizando...', 'sort')">⚡ Organizar</button>
                <button class="btn-action btn-blue" onclick="actionWithLoading(archiveCurrent, 'Arquivando...')">📁 Fechar Semana</button>
                <button class="btn-action btn-blue" onclick="toggleHistory()">📅 Histórico</button>
                <button class="btn-action btn-red" onclick="clearTable()">🗑️ Limpar</button>
            </div>

            <table id="main-table">
                <thead>
                    <tr><th>NICK</th><th>ID</th><th>CARGO</th><th>META</th><th>RESULTADO</th><th>REUNIÃO</th><th>OBS</th><th>AÇÕES</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="history-page">
        <header><h3>Histórico de Planilhas</h3><button class="btn-action btn-blue" onclick="toggleHistory()">Voltar ao Painel</button></header>
        <div id="history-list" style="padding: 10px;"></div>
    </div>

    <div id="view-modal">
        <header><h3>Visualizando Backup</h3><button class="btn-action btn-red" onclick="closeModal()">Fechar</button></header>
        <div id="modal-content" class="table-container"></div>
    </div>

    <div id="color-picker" class="color-picker">
        <div class="color-dot" style="background:transparent; border: 1px dashed #999;" onclick="applyColor('transparent')"></div>
        <div class="color-dot" style="background:#c0392b" onclick="applyColor('#c0392b')"></div>
        <div class="color-dot" style="background:#27ae60" onclick="applyColor('#27ae60')"></div>
        <div class="color-dot" style="background:#2980b9" onclick="applyColor('#2980b9')"></div>
        <div class="color-dot" style="background:#d35400" onclick="applyColor('#d35400')"></div>
        <div class="color-dot" style="background:#8e44ad" onclick="applyColor('#8e44ad')"></div>
        <div class="color-dot" style="background:#2c3e50" onclick="applyColor('#2c3e50')"></div>
        <div class="color-dot" style="background:#444" onclick="applyColor('#444')"></div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        let familyData = JSON.parse(localStorage.getItem('familyMembers')) || [];
        let historyData = JSON.parse(localStorage.getItem('familyHistory')) || [];
        let currentEditing = { i: null, field: null, el: null };
        let selectedRole = "";

        // LISTA DE CARGOS ATUALIZADA
        const listaCargos = [
            "Fundador(00)📜", 
            "Dono do Morro (01)", 
            "Braço Direito (02)", 
            "Chefe do Morro (03)", 
            "Conselheiro", 
            "Gerente Geral", 
            "Gerente", 
            "Sintonia",
            "Chefe de Operações", 
            "Segurança da Favela", 
            "Linha de Frente", 
            "Atirador", 
            "Pistoleiro", 
            "Novato", 
            "Frente", 
            "Frente da boca", 
            "Traficante", 
            "Vapor", 
            "Fogueteiro", 
            "Aviãozinho", 
            "Olheiro", 
            "Cria"
        ];

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('loginData'));
            if(saved) {
                document.getElementById('user-nick').value = saved.nick;
                document.getElementById('user-city-id').value = saved.id;
                document.getElementById('remember-box').checked = true;
            }
        };

        function actionWithLoading(callback, message, type = '') {
            const loader = document.getElementById('loader');
            document.getElementById('loader-text').innerText = message;
            loader.style.display = 'flex';
            setTimeout(() => {
                callback();
                loader.style.display = 'none';
                if(type === 'refresh') showNotify("Dados atualizados!", "#2980b9");
                else if(type === 'sort') showNotify("Hierarquia organizada!", "#f39c12");
            }, 600);
        }

        function showNotify(msg, color) {
            Toastify({ text: msg, duration: 3000, position: "right", style: { background: color } }).showToast();
        }

        function selectRole(el, role) {
            document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            selectedRole = role;
        }

        function login() {
            const nick = document.getElementById('user-nick').value;
            if(!nick || !selectedRole) return alert("Preencha o Nick e o Cargo!");
            if(document.getElementById('remember-box').checked) {
                localStorage.setItem('loginData', JSON.stringify({nick, id: document.getElementById('user-city-id').value, role: selectedRole}));
            }
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('welcome-msg').innerHTML = `Logado como: <span style="color:var(--accent)">${nick}</span>`;
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            familyData.forEach((m, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td contenteditable="true" style="background-color:${m.bg?.nick}" onclick="showColors(event, ${i}, 'nick')">${m.nick}</td>
                    <td contenteditable="true" style="background-color:${m.bg?.passaport}" onclick="showColors(event, ${i}, 'passaport')">${m.passaport}</td>
                    <td>
                        <select class="select-cargo" onchange="updateCargo(${i}, this.value)" style="background-color:${m.bg?.cargo}" onclick="showColors(event, ${i}, 'cargo')">
                            ${listaCargos.map(cargo => `<option value="${cargo}" ${m.cargo === cargo ? 'selected' : ''}>${cargo}</option>`).join('')}
                        </select>
                    </td>
                    <td><select onchange="updateData(${i}, 'meta', this.value)" style="background:#222; color:white; border:none;">
                        <option value="PAGA" ${m.meta=='PAGA'?'selected':''}>PAGA</option>
                        <option value="PEDENTE" ${m.meta=='PEDENTE'?'selected':''}>PEDENTE</option>
                        <option value="ELITE" ${m.meta=='ELITE'?'selected':''}>ELITE</option>
                        <option value="FARME" ${m.meta=='FARME'?'selected':''}>FARME</option>
                    </select></td>
                    <td contenteditable="true" style="background-color:${m.bg?.resultado}" onclick="showColors(event, ${i}, 'resultado')">${m.resultado}</td>
                    <td><input type="checkbox" ${m.reuniao=='Sim'?'checked':''} onchange="updateData(${i}, 'reuniao', this.checked?'Sim':'Não')"></td>
                    <td contenteditable="true" style="background-color:${m.bg?.obs}" onclick="showColors(event, ${i}, 'obs')">${m.obs}</td>
                    <td><button onclick="deleteRow(${i})" style="color:var(--danger); background:none; border:none; cursor:pointer;">✖</button></td>
                `;
                
                const editableCells = tr.querySelectorAll('[contenteditable]');
                editableCells.forEach(cell => {
                    cell.addEventListener('blur', () => {
                        const cellIndex = cell.cellIndex;
                        const fields = ['nick', 'passaport', '', '', 'resultado', '', 'obs'];
                        if(fields[cellIndex]) updateData(i, fields[cellIndex], cell.innerText);
                    });
                });
                body.appendChild(tr);
            });
        }

        function importXLSX(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (jsonData.length > 0) {
                    familyData = [];
                    jsonData.forEach((row, index) => {
                        if (index === 0 || !row[0]) return;
                        familyData.push({
                            nick: String(row[0] || "NOME").toUpperCase(),
                            passaport: String(row[1] || "0"),
                            cargo: String(row[2] || "Cria"),
                            meta: String(row[3] || "PEDENTE").toUpperCase(),
                            resultado: String(row[4] || "-"),
                            reuniao: (row[5] && (String(row[5]).toUpperCase() === "SIM" || String(row[5]).toUpperCase() === "X")) ? "Sim" : "Não",
                            obs: String(row[6] || ""),
                            bg: {}
                        });
                    });
                    save(); renderTable();
                    showNotify("Excel importado!", "#1d6f42");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function importCSV(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                familyData = [];
                lines.forEach((line, index) => {
                    if (index === 0 || line.trim() === "") return;
                    const cols = line.split(',');
                    if(cols.length >= 2) {
                        familyData.push({
                            nick: (cols[0] || "NOME").trim().toUpperCase(),
                            passaport: (cols[1] || "0").trim(),
                            cargo: (cols[2] || "Cria").trim(),
                            meta: (cols[3] || "PEDENTE").trim().toUpperCase(),
                            resultado: (cols[4] || "-").trim(),
                            reuniao: (cols[5] && (cols[5].trim().toUpperCase() === "X" || cols[5].trim().toUpperCase() === "SIM")) ? "Sim" : "Não",
                            obs: (cols[6] || "").trim(),
                            bg: {}
                        });
                    }
                });
                save(); renderTable();
                showNotify("CSV importado!", "#27ae60");
            };
            reader.readAsText(file);
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (historyData.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#888;">Nenhum histórico salvo.</p>';
                return;
            }
            list.innerHTML = historyData.map((e,i)=>`
                <div style="background:rgba(37,37,37,0.9); padding:15px; margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid var(--accent); backdrop-filter:blur(5px);">
                    <span>📅 <b>${e.date}</b> | 👥 ${e.data.length} Membros</span>
                    <div>
                        <button class="btn-action btn-blue" onclick="viewBackup(${i})">👁️ Ver</button>
                        <button class="btn-action btn-yellow" onclick="restore(${i})">🔄 Restaurar</button>
                        <button class="btn-action btn-red" onclick="deleteHistory(${i})">🗑️ Apagar</button>
                    </div>
                </div>
            `).join('');
        }

        function viewBackup(i) {
            const backup = historyData[i].data;
            let html = `<table><thead><tr><th>NICK</th><th>ID</th><th>CARGO</th><th>META</th><th>RESULTADO</th><th>OBS</th></tr></thead><tbody>`;
            backup.forEach(m => {
                html += `<tr><td>${m.nick}</td><td>${m.passaport}</td><td>${m.cargo}</td><td>${m.meta}</td><td>${m.resultado}</td><td>${m.obs}</td></tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('view-modal').style.display = 'block';
        }

        function archiveCurrent() {
            if(familyData.length === 0) return alert("Não há dados!");
            if(!confirm("Fechar a semana?")) return;
            historyData.unshift({date: new Date().toLocaleString('pt-BR'), data: JSON.parse(JSON.stringify(familyData))});
            localStorage.setItem('familyHistory', JSON.stringify(historyData));
            familyData = familyData.map(m => ({...m, meta:"PEDENTE", resultado:"-", reuniao:"Não", obs:"", bg: {}}));
            save(); renderTable();
        }

        function deleteHistory(i) {
            if(confirm("Apagar permanentemente?")) {
                historyData.splice(i, 1);
                localStorage.setItem('familyHistory', JSON.stringify(historyData));
                renderHistory();
            }
        }

        function closeModal() { document.getElementById('view-modal').style.display = 'none'; }
        function updateCargo(i, v) { familyData[i].cargo = v; save(); }
        
        function organizeTable() { 
            familyData.sort((a,b) => {
                let idxA = listaCargos.indexOf(a.cargo);
                let idxB = listaCargos.indexOf(b.cargo);
                return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
            }); 
            save(); renderTable(); 
        }

        function updateData(i, f, v) { familyData[i][f] = v; save(); }
        function save() { localStorage.setItem('familyMembers', JSON.stringify(familyData)); }
        function addRow() { familyData.push({nick:"NOME", passaport:"0", cargo:"Cria", meta:"PEDENTE", resultado:"-", reuniao:"Não", obs:"", bg:{}}); renderTable(); }
        function deleteRow(i) { if(confirm("Remover?")) { familyData.splice(i,1); save(); renderTable(); }}
        
        function toggleHistory() {
            const d = document.getElementById('dashboard'), h = document.getElementById('history-page');
            if(d.style.display === 'block' || d.style.display === '') {
                d.style.display = 'none'; h.style.display = 'block'; renderHistory();
            } else {
                d.style.display = 'block'; h.style.display = 'none';
            }
        }

        function restore(i) { 
            if(confirm("Restaurar backup?")) { 
                familyData = JSON.parse(JSON.stringify(historyData[i].data)); save(); renderTable(); toggleHistory(); 
            }
        }
        function clearTable() { if(confirm("Limpar tudo?")) { familyData = []; save(); renderTable(); }}
        
        function showColors(e, i, field) {
            currentEditing = { i, field, el: e.target };
            const p = document.getElementById('color-picker');
            p.style.display = 'grid'; 
            p.style.top = (e.pageY + 5) + 'px'; p.style.left = (e.pageX + 5) + 'px';
            e.stopPropagation();
        }
        
        function applyColor(color) {
            if(currentEditing.el) {
                currentEditing.el.style.backgroundColor = color;
                if(!familyData[currentEditing.i].bg) familyData[currentEditing.i].bg = {};
                familyData[currentEditing.i].bg[currentEditing.field] = color;
                save();
            }
        }
        document.onclick = () => document.getElementById('color-picker').style.display = 'none';
    </script>
</body>
</html>
